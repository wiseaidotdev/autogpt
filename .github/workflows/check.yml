name: 🦀 Cargo Build

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        features:
          [
            "",
            "cli",
            "img",
            "git",
            "gem",
            "xai",
            "net",
            "mail",
            "oai",
            "mem",
            "cld",
            "gpt",
            "co",
            "hf",
            "mcp",
            "gpt,cli",
            "cli,mcp",
            "hf,mcp",
            "oai,mcp",
            "hf,net",
            "cli,hf",
            "cli,gem",
            "cli,oai",
            "cli,cld",
            "cli,xai",
            "cli,co",
            "cli,hf,net",
            "cli,gem,oai",
            "cli,gem,gpt,net,git",
            "gem,gpt",
            "oai,gpt",
            "cld,gpt",
            "co,gpt",
            "xai,gpt",
            "hf,gpt",
            "all-features",
          ]
    steps:
      - uses: actions/checkout@v6
      - name: Build
        run: |
          if [ "${{ matrix.features }}" == "all-features" ]; then
            cargo check --all-features
          elif [ -z "${{ matrix.features }}" ]; then
            cargo check --no-default-features
          else
            cargo check --no-default-features --features "${{ matrix.features }}"
          fi
